# =============================================
# Nginx 配置文件
# 西柚IT资产管理系统
#
# 使用方式:
#   1. HTTP 模式: 将此文件挂载到容器的 /etc/nginx/conf.d/default.conf
#   2. HTTPS 模式: 同时挂载 SSL 证书到 /etc/nginx/ssl/
# =============================================

# 运行用户
user nginx;

# 工作进程数（auto 表示自动检测 CPU 核心数）
worker_processes auto;

# 错误日志
error_log /var/log/nginx/error.log warn;

# 进程文件
pid /var/run/nginx.pid;

# 事件模块配置
events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

# HTTP 模块配置
http {
    # 引入 MIME 类型
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    # 访问日志
    access_log /var/log/nginx/access.log main;

    # 基础配置
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript application/x-javascript
               image/svg+xml font/opentype;

    # 上游后端服务器
    upstream backend {
        server app:8088;
        keepalive 32;
    }

    # HTTP 服务器配置
    server {
        listen 80;
        # 域名配置（生产环境可修改为实际域名）
        server_name localhost;

        # 强制跳转 HTTPS（ENABLE_HTTPS=true 时取消注释）
        # return 301 https://$server_name$request_uri;

        # 根目录（前端静态文件）
        root /usr/share/nginx/html;
        index index.html;

        # 前端路由支持（SPA）
        location / {
            try_files $uri $uri/ /index.html;

            # 静态资源缓存
            location ~.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }
        }

        # API 反向代理
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;

            # 请求头设置
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # 缓冲设置
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # WebSocket 支持（如有需要）
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # 健康检查
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # 禁止访问隐藏文件
        location ~ /\. {
            deny all;
        }

        # 错误页面
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # HTTPS 服务器配置（ENABLE_HTTPS=true 时启用）
    # 将 SSL 证书挂载到 /etc/nginx/ssl/ 目录
    # upstream backend_ssl {
    #     server app:8088;
    #     keepalive 32;
    # }
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name ${DOMAIN_NAME};
    #
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 1d;
