# =============================================
# Docker Compose 配置文件
# 雷犀IT资产管理系统 - Nginx 生产环境部署
#
# 架构:
#   nginx (80) → app (8088) → mysql (3306) + redis (6379)
#
# Redis 用途:
#   - 系统配置缓存（减少数据库查询）
#   - 字典数据缓存（提升查询性能）
#   - 登录安全（防暴力破解、账户锁定）
#   - WebSocket 消息同步（支持多实例部署）
#   - 定时任务分布式锁（避免任务重复执行）
#   - 幂等性控制（防重复提交）
#
# 使用方式:
#   npm run docker:up:build  # 构建并启动所有服务
#   npm run docker:up         # 启动所有服务（使用现有镜像）
#   npm run docker:down       # 停止所有服务
# =============================================

services:
  # =============================================
  # MySQL 数据库服务
  # =============================================
  mysql:
    image: mysql:8.0
    container_name: ciyo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      TZ: Asia/Shanghai
    ports:
      # 宿主机端口:容器内部端口
      - "${MYSQL_HOST_PORT}:3306"
    volumes:
      # MySQL 首次启动自动执行 SQL 初始化（只使用精简的初始化脚本）
      - ./sql/init-leixi-itam.sql:/docker-entrypoint-initdb.d/init.sql
      # 持久化数据
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --lower_case_table_names=1
    networks:
      - ciyo-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================
  # Redis 服务
  # 用途: 系统配置缓存、字典缓存、登录安全、WebSocket同步、分布式锁
  # =============================================
  redis:
    image: redis:7-alpine
    container_name: ciyo-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --tcp-keepalive 60
      --timeout 300
    environment:
      - TZ=Asia/Shanghai
    ports:
      # 宿主机端口:容器内部端口
      - "${REDIS_HOST_PORT}:6379"
    volumes:
      # 持久化数据
      - redis_data:/data
    networks:
      - ciyo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================
  # Spring Boot 后端服务
  # =============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ciyo-app
    restart: unless-stopped
    environment:
      # MySQL 连接配置
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      # Redis 连接配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Spring Boot 配置
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      APP_HOST: ${APP_HOST}
      APP_PORT: ${APP_PORT}
      # 安全配置 - AES 加密密钥（生产环境必须设置）
      CIYO_SECURITY_AES_KEY: ${CIYO_SECURITY_AES_KEY}
      # 安全配置 - 旧 AES 密钥（用于密码迁移，可选）
      # 如果首次部署新密钥，设置为旧密钥的值；密钥更换后，设置为新的旧密钥值
      CIYO_SECURITY_AES_KEY_OLD: ${CIYO_SECURITY_AES_KEY_OLD:-}
      # CORS 允许来源（生产环境设置具体域名，如 https://example.com，开发环境留空）
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      TZ: Asia/Shanghai
    ports:
      # 宿主机端口:容器内部端口
      - "${APP_HOST_PORT}:8088"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # 挂载 SQL 文件（用于手动重新初始化）
      - ./sql:/app/sql
      # 持久化日志
      - app_logs:/app/logs
      # 持久化上传文件
      - upload_data:/data/upload
    networks:
      - ciyo-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8088/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # =============================================
  # Nginx 前端服务
  # =============================================
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.front
      args:
        VITE_APP_BASE_API: ${VITE_APP_BASE_API}
    container_name: ciyo-nginx
    restart: unless-stopped
    ports:
      # 宿主机端口:容器内部端口
      - "${NGINX_HTTP_HOST_PORT}:80"
    depends_on:
      - app
    volumes:
      # 挂载上传文件目录（Nginx 提供静态资源访问）
      - upload_data:/data/upload
    networks:
      - ciyo-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

# =============================================
# 数据卷配置
# =============================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local
  upload_data:
    driver: local

# =============================================
# 网络配置
# =============================================
networks:
  ciyo-network:
    driver: bridge
